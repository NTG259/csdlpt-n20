spring:
  application:
    name: sitemain
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Ho_Chi_Minh
  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=store_management;encrypt=true;trustServerCertificate=true}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver


server:
  port: ${SERVER_PORT:8080}


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    disable-swagger-default-url: true


jwt:
  secret: ${JWT_SECRET:change-this-secret-key-to-at-least-32-characters}
  expiration-ms: ${JWT_EXPIRATION_MS:31536000000}


app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:*}


logging:
  charset:
    console: UTF-8
    file: UTF-8


