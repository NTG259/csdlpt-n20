name: ${BACKEND_COMPOSE_NAME:-sitemain-backend}

services:
  backend:
    image: ${BACKEND_IMAGE:-sitemain-backend:latest}
    build:
      context: ./sitemain
      dockerfile: Dockerfile
    container_name: ${BACKEND_CONTAINER_NAME:-sitemain-backend}
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-31536000000}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-*}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    restart: unless-stopped
